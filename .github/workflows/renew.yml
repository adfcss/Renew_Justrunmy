name: JustRunMy 自动续期 (无序随机版)

on:
  workflow_dispatch:
  schedule:
    # 北京时间凌晨 6:00 触发 (UTC 22:00)
    - cron: '0 22 * * *'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should_run: ${{ steps.check-schedule.outputs.should_run }}
    steps:
      - name: 📅 检查执行间隔逻辑 (1-2天随机)
        id: check-schedule
        shell: bash
        run: |
          # 获取当前是一年中的第几天 (001-366)
          DOY=$(date +%j)
          DOY_NUM=$((10#$DOY))
          
          echo "should_run=true" >> $GITHUB_OUTPUT
          
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ $((DOY_NUM % 2)) -eq 0 ]; then
              echo "📅 今天是第 $DOY_NUM 天 (偶数天)，触发[强制签到]模式以防过期。"
            else
              echo "📅 今天是第 $DOY_NUM 天 (奇数天)，进入[随机签到]模式。"
              if [ $(( RANDOM % 2 )) -eq 0 ]; then
                echo "🎲 随机结果：命中！今日执行。"
              else
                echo "🎲 随机结果：跳过。明天是偶数天，必定会执行。"
                echo "should_run=false" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: 🎲 生成随机延迟与无序矩阵
        id: set-matrix
        if: steps.check-schedule.outputs.should_run == 'true'
        shell: bash
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
        run: |
          # 1. 产生精确到秒的随机延迟 (0-4小时 = 0-14400秒)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DELAY=$(shuf -i 0-14400 -n 1)
            H=$(( DELAY / 3600 ))
            M=$(( (DELAY % 3600) / 60 ))
            S=$(( DELAY % 60 ))
            echo "⏰ 随机秒级延迟设定：$H 小时 $M 分 $S 秒"
            echo "⏳ 正在等待延迟结束..."
            sleep $DELAY
          fi

          # 2. 提取所有 EML_x 账号索引并打乱顺序 (shuf)
          COUNT=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(startswith("EML_"))' | sed 's/EML_//' | shuf | jq -R . | jq -s -c .)
          
          if [ "$COUNT" = "[]" ] || [ -z "$COUNT" ]; then
            echo "❌ 未检测到 EML_x 格式的 Secrets，请检查配置！"
            exit 1
          fi
          
          echo "matrix=$COUNT" >> $GITHUB_OUTPUT
          echo "✅ 账号执行顺序已随机打乱: $COUNT"

  renew:
    needs: setup
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 严格遵守 GitHub 6 小时限制
    strategy:
      max-parallel: 1 # 账号逐个执行，防止并发冲突
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}
    
    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🛡️ 启动 sing-box 代理代理
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then
            echo "⚠️ 未设置 PROXY_URL，将尝试直连。"
            exit 0
          fi
          
          SINGBOX_VER="1.11.0"
          echo "正在安装 sing-box v$SINGBOX_VER..."
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box
          
          # 生成配置文件 (调用项目中的解析脚本)
          python proxy_handler.py
          
          # 后台运行
          nohup ./sing-box run -c config.json > singbox.log 2>&1 &
          sleep 5
          
          echo "🔍 验证代理出口..."
          export http_proxy=http://127.0.0.1:8080
          export https_proxy=http://127.0.0.1:8080
          curl -s --connect-timeout 10 https://api.ipify.org || echo "无法获取出口 IP"

      - name: 🛠️ 安装自动化依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool fonts-noto-cjk
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🚀 运行账号 ${{ matrix.account_index }} 续期
        env:
          ACC: ${{ secrets[format('EML_{0}', matrix.account_index)] }}
          ACC_PWD: ${{ secrets[format('PWD_{0}', matrix.account_index)] }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          echo "开始处理账号索引: ${{ matrix.account_index }}"
          # 启动虚拟显示器并执行脚本
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python reset_timer.py

      - name: 📸 错误截图上传
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-acc-${{ matrix.account_index }}
          path: "*.png"
          retention-days: 3
