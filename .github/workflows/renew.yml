name: JustRunMy 自动续期 (全自动智能化版)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 */2 * *'

jobs:
  # --- 第一步：动态计算账号数量 ---
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: bash
        env:
          # 将所有 secrets 转为 JSON 字符串
          ALL_SECRETS: ${{ toJson(secrets) }}
        run: |
          # 提取所有 EML_ 开头的变量名中的数字，生成 JSON 数组
          COUNT=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(startswith("EML_"))' | sed 's/EML_//' | sort -n | jq -R . | jq -s -c .)
          echo "matrix=$COUNT" >> $GITHUB_OUTPUT

  # --- 第二步：根据计算结果运行续期 ---
  renew:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    
    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🛠️ 安装环境
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool fonts-noto-cjk
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🚀 运行原版脚本
        env:
          # 动态映射：从 Secrets 组中动态提取对应索引的值
          # 这行代码会把 secrets["EML_1"] 映射给 JUSTRUNMY_EMAIL
          JUSTRUNMY_EMAIL: ${{ secrets[format('EML_{0}', matrix.account_index)] }}
          JUSTRUNMY_PASSWORD: ${{ secrets[format('PWD_{0}', matrix.account_index)] }}
          TG_BOT_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python justrunmy_renew.py

      - name: 📸 上传错误截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-acc-${{ matrix.account_index }}
          path: "*.png"
